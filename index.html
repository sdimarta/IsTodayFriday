<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Is Today Friday?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1 id="answer"></h1>
    <span id="emoji-friday" class="emoji" role="img" aria-label="celebration">🥳</span>
    <span id="emoji-not-friday" class="emoji" role="img" aria-label="sadness">😢</span>
    <noscript>
      <p>Sorry, we can't tell you if today is Friday without JavaScript.</p>
    </noscript>
  </main>
  <script src="script.js"></script>
</body>
</html>
